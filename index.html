<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>projectoJ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --card: #fffdf8;
      --text: #1f2933;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --shadow: rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(15, 118, 110, 0.15), transparent 35%),
        linear-gradient(180deg, var(--bg), #e8dfd1);
      color: var(--text);
    }

    main {
      width: min(100%, 420px);
      padding: 40px 28px;
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 20px 50px var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 28px;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      padding: 16px 24px;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      transition: background 160ms ease, transform 160ms ease;
    }

    a:hover,
    a:focus-visible {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <h1>projectoJ</h1>
    <p>Download direto da versão Android disponível.</p>
    <a href="mobile_mockup/build/app/outputs/apk/release/app-release.apk" download>
      Descarregar APK
    </a>
  </main>
</body>
</html>
